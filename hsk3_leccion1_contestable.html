    <div id="quizQuestion" class="quiz-question"></div>
    <div id="quizOptions" class="quiz-options"></div>
  </div>
</section>

<section id="flashcardScreen" class="screen">
  <div class="card quiz-panel">
    <h2 class="exercise-title">🃏 Flashcards del glosario</h2>
    <div class="quiz-controls">
      <button class="secondary" onclick="closeFlashcards()">⬅ Volver / cerrar tarjetas</button>
      <button onclick="flipFlashcard()">🔄 Voltear</button>

      {letter:"F", words:[w("可能","kěnéng","posiblemente"), w("是","shì","ser / es"), w("工作","gōngzuò","trabajo"), w("太","tài","demasiado"), w("累","lèi","cansado"), p("，"), w("生病","shēngbìng","enfermarse"), w("了","le","partícula de cambio"), p("。")]}

    questions:[
      {num:21, answer:"F", words:[w("你","nǐ","tú"), w("怎么了","zěnme le","¿qué te pasa?"), p("？"), w("今天","jīntiān","hoy"), w("一点儿","yìdiǎnr","un poco / nada en negativo"), w("东西","dōngxi","cosas / comida"), w("都","dōu","incluso"), w("没吃","méi chī","no comiste"), p("。")]},
      {num:22, answer:"C", words:[w("今天","jīntiān","hoy"), w("是","shì","ser / es"), w("周末","zhōumò","fin de semana"), p("，"), w("你","nǐ","tú"), w("去","qù","ir"), w("学校","xuéxiào","escuela"), w("做什么","zuò shénme","hacer qué"), p("？")]},
      {num:23, answer:"D", words:[w("好啊","hǎo a","está bien"), p("，"), w("哪天","nǎ tiān","qué día"), p("？")]},
      {num:24, answer:"A", words:[w("你","nǐ","tú"), w("是","shì","ser / es"), w("新来的","xīn lái de","recién llegado / nuevo"), w("医生","yīshēng","doctor"), w("吗","ma","partícula de pregunta"), p("？")]},
      {num:25, answer:"B", words:[w("那","nà","entonces"), w("我","wǒ","yo"), w("明天","míngtiān","mañana"), w("再","zài","otra vez / entonces"), w("来","lái","venir"), w("吧","ba","partícula suave"), p("，"), w("谢谢","xièxie","gracias"), p("。")]}
    ]
  },
  {

    title:"Lección 1 · Ejercicio 2",
    instructions:"Elige la palabra correcta para completar cada oración.",
    answers:"26 A · 27 D · 28 F · 29 B · 30 C",
    bank:[{l:"A",t:"一直",py:"yìzhí",tr:"siempre / continuamente"},{l:"B",t:"周末",py:"zhōumò",tr:"fin de semana"},{l:"C",t:"带",py:"dài",tr:"llevar / traer"},{l:"D",t:"搬",py:"bān",tr:"mudarse / mover"},{l:"E",t:"声音",py:"shēngyīn",tr:"voz / sonido"},{l:"F",t:"面包",py:"miànbāo",tr:"pan"}],
    example:{words:[w("她","tā","ella"), w("说话","shuōhuà","hablar"), w("的","de","partícula"), blank("E"), w("多","duō","qué tan / cuán"), w("好听","hǎotīng","sonar bonito"), w("啊","a","partícula exclamativa"), p("！")]},
    questions:[
      {num:26, words:[w("这几年","zhè jǐ nián","estos años"), w("我","wǒ","yo"), blank("A"), w("忙","máng","ocupado"), w("工作","gōngzuò","trabajo"), p("，"), w("没时间","méi shíjiān","no tener tiempo"), w("去","qù","ir"), w("旅游","lǚyóu","viajar"), p("。")]},
      {num:27, words:[w("你","nǐ","tú"), blank("D"), w("家","jiā","casa"), w("的","de","partícula"), w("时候","shíhou","cuando"), p("，"), w("我","wǒ","yo"), w("来","lái","venir"), w("帮","bāng","ayudar"), w("你","nǐ","tú"), w("吧","ba","partícula suave"), p("。")]},
      {num:28, words:[w("这个","zhège","este"), blank("F"), w("很不错","hěn búcuò","muy bueno"), p("，"), w("是","shì","ser / es"), w("你","nǐ","tú"), w("买","mǎi","comprar"), w("的","de","estructura 是...的"), w("吗","ma","partícula de pregunta"), p("？")]},
      {num:29, words:[w("A","",""), p("："), w("这件","zhè jiàn","esta prenda"), w("新衣服","xīn yīfu","ropa nueva"), w("是","shì","ser / es"), w("什么","shénme","qué"), w("时候","shíhou","momento"), w("买","mǎi","comprar"), w("的","de","estructura 是...的"), p("？"), br(), w("B","",""), p("："), w("上","shàng","pasado / anterior"), blank("B"), p("，"), w("我妹妹","wǒ mèimei","mi hermana menor"), w("跟","gēn","con"), w("我","wǒ","yo"), w("一起","yìqǐ","juntos"), w("去","qù","ir"), w("买","mǎi","comprar"), w("的","de","estructura 是...的"), p("。")]},
      {num:30, words:[w("A","",""), p("："), w("现在","xiànzài","ahora"), w("北方","běifāng","norte"), w("很冷","hěn lěng","hace mucho frío"), p("，"), w("多","duō","más"), blank("C"), w("几件","jǐ jiàn","varias prendas"), w("衣服","yīfu","ropa"), w("吧","ba","partícula sugerencia"), p("。"), br(), w("B","",""), p("："), w("我","wǒ","yo"), w("已经","yǐjīng","ya"), w("准备好","zhǔnbèi hǎo","preparar bien"), w("了","le","partícula"), p("。")]}

function w(text,pinyin,translation,grammar=""){return {text,pinyin,translation,grammar}}function p(text){return {text,punctuation:true}}function blank(ans){return {blank:true,answer:ans}}function br(){return {break:true}}
let current=0;let glossary=JSON.parse(localStorage.getItem("hsk3Glossary")||"[]");let markedWords=JSON.parse(localStorage.getItem("hsk3MarkedWords")||"[]");let quizDirection="zh-es";let quizShowPinyin=true;let quizIndex=0;let quizCorrect=0;let currentQuizItem=null;let quizPool=[];let quizAnswered=false;let flashcardPool=[];let flashcardIndex=0;let flashcardFlipped=false;
function openExercise(i){current=i;document.getElementById("lessonScreen").classList.remove("active");document.getElementById("exerciseScreen").classList.add("active");renderExercise()}function backToLessons(){document.getElementById("exerciseScreen").classList.remove("active");document.getElementById("lessonScreen").classList.add("active")}function prevExercise(){current=(current-1+exercises.length)%exercises.length;renderExercise()}function nextExercise(){current=(current+1)%exercises.length;renderExercise()}
function renderExercise(){const ex=exercises[current];document.getElementById("exerciseTitle").textContent=ex.title;document.getElementById("instructions").textContent=ex.instructions;document.getElementById("counter").textContent=`Ejercicio ${current+1} de ${exercises.length}`;document.getElementById("answerBox").style.display="none";document.getElementById("answerBox").textContent="Respuestas: "+ex.answers;document.getElementById("checkResult").style.display="none";document.getElementById("checkResult").textContent="";document.getElementById("infoBox").style.display="none";blankCounter=0;document.getElementById("exerciseContent").innerHTML=ex.type==="matching"?renderMatching(ex):renderFill(ex);renderGlossary()}
function renderMatching(ex){return `<div class="matching-options">${ex.options.map(o=>`<div class="option-line"><div class="option-letter">${o.letter}</div><div>${renderWords(o.words)}</div></div>`).join("")}</div><div class="question-list"><div class="question-line"><div>例：</div><div>${renderWords(ex.example.text)}</div><div class="blank">（ ${ex.example.answer} ）</div></div>${ex.questions.map(q=>`<div class="question-line"><div>${q.num}.</div><div>${renderWords(q.words)}</div><div class="blank">（ ${answerSelect(q.num,q.answer)} ）</div></div>`).join("")}</div>`}
function renderFill(ex){return `<div class="word-bank">${ex.bank.map(b=>`<span class="bank-item"><b>${b.l}</b> ${spanWord(b.t,b.py,b.tr)}</span>`).join("")}</div><div class="fill-line">例如：${renderWords(ex.example.words)}</div>${ex.questions.map(q=>`<div class="fill-line"><b>${q.num}.</b> ${renderWords(q.words)}</div>`).join("")}`}
function renderWords(words){return words.map(x=>{if(x.break)return '<br>';if(x.blank)return `<span class="blank">（ ${answerSelect("blank"+blankCounter++, x.answer)} ）</span>`;if(x.punctuation)return `<span class="punct">${x.text}</span>`;return spanWord(x.text,x.pinyin,x.translation,x.grammar)}).join("")}
let blankCounter=0;function answerSelect(id,answer=""){return `<select class="answer-select" data-answer="${answer}" data-q="${id}"><option value=""></option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option></select>`}
function spanWord(t,py,tr,gr=""){const saved=glossary.some(g=>g.text===t)?" saved":"";const marked=markedWords.includes(t)?" marked":"";return `<span class="word${saved}${marked}" onclick='showInfo(${JSON.stringify({text:t,pinyin:py,translation:tr,grammar:gr})})'>${t}</span>`}
function showInfo(item){
  if(!item.pinyin&&!item.translation)return;
  document.getElementById("infoWord").textContent=item.text;
  document.getElementById("infoPinyin").textContent=item.pinyin||"";
  document.getElementById("infoTranslation").textContent=item.translation||"";
  document.getElementById("infoGrammar").textContent=item.grammar||"";
  document.getElementById("infoGrammar").style.display=item.grammar?"block":"none";
  document.getElementById("infoBox").style.display="block";

  const existing=glossary.find(g=>g.text===item.text);
  glossary=glossary.filter(g=>g.text!==item.text);
  glossary.unshift(existing?{...existing,...item}:item);

  if(markedWords.includes(item.text)){
    markedWords=markedWords.filter(x=>x!==item.text);
  }else{
    markedWords.unshift(item.text);
  }

  localStorage.setItem("hsk3Glossary",JSON.stringify(glossary));
  localStorage.setItem("hsk3MarkedWords",JSON.stringify(markedWords));
  renderGlossary();
  renderExercise();
}
function checkAnswers(){const selects=[...document.querySelectorAll(".answer-select")];let total=0,ok=0;selects.forEach(sel=>{const ans=sel.dataset.answer; if(!ans)return; total++; sel.classList.remove("correct","wrong"); if(sel.value===ans){ok++; sel.classList.add("correct")} else if(sel.value){sel.classList.add("wrong")}});const box=document.getElementById("checkResult");box.textContent=`Resultado: ${ok} de ${total} correctas.`;box.style.display="block"}
function toggleAnswer(){const box=document.getElementById("answerBox");box.style.display=box.style.display==="block"?"none":"block"}function toggleGlossary(){document.getElementById("glossaryCard").classList.toggle("hidden")}
function clearGlossary(){glossary=[];markedWords=[];localStorage.removeItem("hsk3Glossary");localStorage.removeItem("hsk3MarkedWords");renderGlossary();renderExercise()}function renderGlossary(){const list=document.getElementById("glossaryList");if(!glossary.length){list.innerHTML='<p class="empty">Todavía no has tocado palabras.</p>';return}list.innerHTML=glossary.map(g=>`<div class="glossary-item ${markedWords.includes(g.text)?"marked":""}"><strong>${g.text}</strong><button class="sound-btn" onclick='speakChinese(${JSON.stringify(g.text)})'>🔊</button><div class="pinyin">${g.pinyin||""}</div><div>${g.translation||""}</div></div>`).join("")}

function cleanGlossary(){return glossary.filter(g=>g.text&&g.pinyin&&g.translation)}
function shuffle(arr){
  const copy=[...arr];
  for(let i=copy.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }
  return copy;
}
function speakChinese(text){
  if(!text || !("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="zh-CN";
  u.rate=0.78;
  u.pitch=1;
  window.speechSynthesis.speak(u);
}
function openGlossaryQuiz(){
  document.getElementById("lessonScreen").classList.remove("active");
  document.getElementById("exerciseScreen").classList.remove("active");
  document.getElementById("flashcardScreen").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");
  resetGlossaryQuiz();
}
function closeGlossaryQuiz(){
  document.getElementById("quizScreen").classList.remove("active");
  document.getElementById("exerciseScreen").classList.add("active");
}
function setQuizDirection(dir){quizDirection=dir;resetGlossaryQuiz()}
function toggleQuizPinyin(){quizShowPinyin=!quizShowPinyin;renderQuizQuestion()}
function resetGlossaryQuiz(){
  const items=cleanGlossary();
  quizIndex=0;
  quizCorrect=0;
  currentQuizItem=null;
  quizAnswered=false;
  quizPool=shuffle(items);
  nextQuizQuestion();
}
function nextQuizQuestion(){
  const items=cleanGlossary();
  const status=document.getElementById("quizStatus");
  const question=document.getElementById("quizQuestion");
  const options=document.getElementById("quizOptions");
  if(items.length<4){
    status.textContent=`Necesitas mínimo 4 palabras en el glosario. Llevas ${items.length}.`;
    question.innerHTML="";
    options.innerHTML="";
    return;
  }
  if(quizPool.length===0){
    status.textContent=`Juego terminado. Practicaste ${quizIndex} palabras sin repetir. Correctas: ${quizCorrect}.`;
    question.innerHTML=`<div>🏆 Terminaste todas las palabras del glosario.<div class="quiz-sub">Presiona “Reiniciar juego” para volver a practicar.</div></div>`;
    options.innerHTML="";
    currentQuizItem=null;
    return;
  }
  quizIndex++;
  quizAnswered=false;
  currentQuizItem=quizPool.pop();
  renderQuizQuestion();
}
function renderQuizQuestion(){
  const items=cleanGlossary();
  const status=document.getElementById("quizStatus");
  const question=document.getElementById("quizQuestion");
  const options=document.getElementById("quizOptions");
  if(items.length<4||!currentQuizItem)return;
  status.textContent=`Palabras acumuladas: ${items.length} · Pregunta ${quizIndex} de ${items.length} · Correctas: ${quizCorrect}`;
  if(quizDirection==="zh-es"){
    question.innerHTML=`<div><div>${currentQuizItem.text} <button class="sound-btn" onclick='speakChinese(${JSON.stringify(currentQuizItem.text)})'>🔊</button></div>${quizShowPinyin?`<div class="quiz-sub">${currentQuizItem.pinyin||""}</div>`:""}</div>`;
  }else{
    question.innerHTML=`<div>${currentQuizItem.translation}<div class="quiz-sub"><button class="sound-btn" onclick='speakChinese(${JSON.stringify(currentQuizItem.text)})'>🔊 Escuchar chino</button></div></div>`;
  }
  const distractors=shuffle(items.filter(x=>x.text!==currentQuizItem.text)).slice(0,3);
  const choices=shuffle([currentQuizItem,...distractors]);
  options.innerHTML=choices.map(opt=>{
    const label=quizDirection==="zh-es"
      ? opt.translation
      : `${opt.text}${quizShowPinyin?`<div class="quiz-sub">${opt.pinyin||""}</div>`:""}`;
    const isCorrect=opt.text===currentQuizItem.text ? "true" : "false";
    return `<button class="quiz-option" data-correct="${isCorrect}" onclick='checkQuizAnswer(this,${JSON.stringify(opt.text)})'>${label}</button>`;
  }).join("");
}
function checkQuizAnswer(btn,text){
  if(quizAnswered || !currentQuizItem) return;
  quizAnswered=true;
  const buttons=[...document.querySelectorAll(".quiz-option")];
  buttons.forEach(b=>b.disabled=true);
  if(text===currentQuizItem.text){
    btn.classList.add("correct");
    quizCorrect++;
  }else{
    btn.classList.add("wrong");
    buttons.forEach(b=>{if(b.dataset.correct==="true")b.classList.add("correct")});
  }
  document.getElementById("quizStatus").textContent=`Palabras acumuladas: ${cleanGlossary().length} · Pregunta ${quizIndex} de ${cleanGlossary().length} · Correctas: ${quizCorrect}`;
  setTimeout(nextQuizQuestion,1100);
}

function openFlashcards(){
  document.getElementById("lessonScreen").classList.remove("active");
  document.getElementById("exerciseScreen").classList.remove("active");
  document.getElementById("quizScreen").classList.remove("active");
  document.getElementById("flashcardScreen").classList.add("active");
  resetFlashcards();
}
function closeFlashcards(){
  document.getElementById("flashcardScreen").classList.remove("active");
  document.getElementById("exerciseScreen").classList.add("active");
}
function resetFlashcards(){
  flashcardPool=shuffle(cleanGlossary());
  flashcardIndex=0;
  flashcardFlipped=false;
  renderFlashcard();
}
function renderFlashcard(){
  const status=document.getElementById("flashcardStatus");
  const box=document.getElementById("flashcardBox");
  const items=cleanGlossary();
  if(items.length===0){
    status.textContent="Todavía no hay palabras en el glosario.";
    box.innerHTML="Toca palabras del ejercicio para agregarlas aquí.";
    return;
  }
  if(flashcardPool.length===0){
    flashcardPool=shuffle(items);
    flashcardIndex=0;
  }
  const item=flashcardPool[flashcardIndex % flashcardPool.length];
  status.textContent=`Tarjeta ${flashcardIndex+1} de ${flashcardPool.length} · Palabras acumuladas: ${items.length}`;
  if(!flashcardFlipped){
    box.innerHTML=`<div><div>${item.text}</div><div class="flashcard-note">Presiona “Voltear” para ver el español.</div></div>`;
  }else{
    box.innerHTML=`<div><div>${item.text}</div><div class="quiz-sub">${item.pinyin||""}</div><div class="flashcard-back">${item.translation||""}</div></div>`;
  }
}
function flipFlashcard(){
  if(!cleanGlossary().length) return;
  flashcardFlipped=!flashcardFlipped;
  renderFlashcard();
}
function nextFlashcard(){
  if(!cleanGlossary().length) return;
  flashcardIndex=(flashcardIndex+1)%flashcardPool.length;
  flashcardFlipped=false;
  renderFlashcard();
}
function speakCurrentFlashcard(){
  if(!flashcardPool.length) return;
  const item=flashcardPool[flashcardIndex % flashcardPool.length];
  if(item) speakChinese(item.text);
}

renderGlossary();
</script>
